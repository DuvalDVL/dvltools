---
layout: default
title: Générateur de Mockup Web Gratuit | Duval DVL
description: Intégrez vos captures d'écran dans un navigateur élégant pour booster votre portfolio.
---

<div class="page-wrapper-lab">
    <div class="intro-lab" style="text-align:center;">
        <h2>Sublimez vos captures d'écran en un clic</h2>
        <p>Idéal pour votre portfolio ou vos réseaux sociaux.</p>
    </div>

    <div class="layout-lab">
        <aside class="panel card-lab">
            <div class="field">
                <label>Ratio de sortie</label>
                <div class="seg" id="ratio-seg" style="display:flex; gap:5px; margin-top:5px;">
                    <button class="active" data-v="16/9">16:9</button>
                    <button data-v="1/1">Carré</button>
                </div>
            </div>
            <div class="upload-zone" id="drop-zone" style="border:2px dashed #ddd; padding:2rem; text-align:center; margin-top:1rem; cursor:pointer;">
                <p>Glissez votre image ici</p>
                <input type="file" id="img-input" style="display:none;">
            </div>
        </aside>

        <main class="preview-panel card-lab" style="text-align:center;">
            <canvas id="cnv" style="display:none; max-width:100%; height:auto;"></canvas>
            <div class="actions" id="actions" style="display:none; gap:10px; justify-content:center; margin-top:1rem;">
                <button class="btn" onclick="downloadPNG()">Télécharger le mockup</button>
                <button class="btn-outline" onclick="location.reload()">Changer</button>
            </div>
        </main>
    </div>
</div>

<script>
// CORRECTION : Utilisation de toBlob pour éviter les crashs sur les grandes images
function downloadPNG() { 
    const cnv = document.getElementById('cnv'); 
    cnv.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.download = 'mockup-duval-dvl.png';
        a.href = url;
        a.click();
        URL.revokeObjectURL(url);
    }, 'image/png');
}
</script>
