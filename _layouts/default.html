<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ page.title }}">
    <meta property="og:description" content="{{ page.description }}">
    <meta property="og:url" content="https://lab.duvaldvl.com{{ page.url }}">
    <meta property="og:image" content="https://duvaldvl.com/assets/img/social-preview-lab-dvl.webp">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/png" href="/favicon-lab.png">
    <link rel="stylesheet" href="/assets/css/styles.css">
    
    {% if page.url contains 'calculateur-roi' %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% endif %}
    {% if page.url contains 'convertisseur-images' %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    {% endif %}
</head>
<body>
    {% include header.html %}
    {{ content }}
    {% include footer.html %}
</body>
</html>
