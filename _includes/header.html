<header class="site-header">
    <div class="container navbar">
        <a href="https://duvaldvl.com/" class="logo">Duval <span>DVL.</span></a>
        
        <div class="menu-toggle" id="mobile-menu">☰</div>
        
        <nav class="nav-links" id="nav-links">
            <a href="/" class="nav-lab-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Accueil du Lab
            </a>
            <a href="https://duvaldvl.com/creation-sites-internet/">Création Site Internet</a>
            <a href="https://duvaldvl.com/referencement-local/">SEO Local</a>
            <a href="https://duvaldvl.com/contact/" class="btn" style="padding: 10px 24px; font-size: 0.95rem;">Créer mon site</a>
        </nav>
    </div>
</header>

<style>
/* CSS Spécifique au Header du Lab */
.site-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); height: var(--header-height, 80px); position: fixed; top: 0; left: 0; right: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; }
.navbar { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: var(--container-width, 1200px); margin: 0 auto; padding: 0 24px; }
.logo { font-size: 1.6rem; font-weight: 900; color: var(--accent-color, #111111); letter-spacing: -0.05em; text-decoration: none; }
.logo span { color: var(--primary, #009966); }
.nav-links { display: flex; gap: 32px; align-items: center; }
.nav-links a { font-weight: 600; font-size: 0.95rem; color: var(--accent-color, #111111); text-decoration: none; transition: 0.3s; }
.nav-links a:hover { color: var(--primary, #009966); }
.nav-lab-link { display: flex; align-items: center; gap: 6px; color: var(--muted, #4a5568) !important; }
.nav-lab-link:hover { color: var(--primary, #009966) !important; }
.btn { display: inline-flex; align-items: center; justify-content: center; background: var(--primary, #009966); color: white !important; border-radius: 50px; font-weight: 600; border: 2px solid var(--primary, #009966); cursor: pointer; transition: 0.3s; }
.btn:hover { background: var(--primary-dark, #007a52); border-color: var(--primary-dark, #007a52); }
.menu-toggle { display: none; font-size: 1.8rem; cursor: pointer; color: var(--accent-color, #111111); }

@media (max-width: 900px) {
    .menu-toggle { display: block; z-index: 1001; position: relative; }
    .nav-links {
        position: fixed; top: 0; right: 0; height: 100vh; width: 100%; max-width: 320px;
        background-color: #ffffff !important; display: flex; flex-direction: column;
        padding: calc(var(--header-height, 80px) + 2rem) 2rem 2rem;
        box-shadow: -10px 0 30px rgba(0,0,0,0.15); transform: translateX(100%);
        transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1000; overflow-y: auto;
    }
    .nav-links.active { transform: translateX(0); }
    .btn { width: 100%; }
}
</style>

<script>
    const mobileMenuBtn = document.getElementById('mobile-menu');
    const navLinks = document.getElementById('nav-links');

    mobileMenuBtn.addEventListener('click', function() {
        navLinks.classList.toggle('active');
        if (navLinks.classList.contains('active')) {
            mobileMenuBtn.innerHTML = '✕';
            mobileMenuBtn.style.fontSize = '2rem';
            document.body.style.overflow = 'hidden';
        } else {
            mobileMenuBtn.innerHTML = '☰';
            mobileMenuBtn.style.fontSize = '1.8rem';
            document.body.style.overflow = 'auto';
        }
    });

    const menuLinks = navLinks.querySelectorAll('a');
    menuLinks.forEach(link => {
        link.addEventListener('click', () => {
            navLinks.classList.remove('active');
            mobileMenuBtn.innerHTML = '☰';
            document.body.style.overflow = 'auto';
        });
    });
</script>
